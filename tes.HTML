        // ==================== FUNGSI IP DAN JARINGAN ====================
        async function getIPInfo() {
            try {
                // Dapatkan IP publik
                const ipResponse = await fetch('https://api.ipify.org?format=json');
                const ipData_json = await ipResponse.json();
                const ip = ipData_json.ip;
                
                // Dapatkan info detail IP dari multiple API untuk presisi
                const [ipapiResponse, ipinfoResponse] = await Promise.allSettled([
                    fetch(`https://ipapi.co/${ip}/json/`),
                    fetch(`https://ipinfo.io/${ip}/json`)
                ]);
                
                let ipapiData = {};
                let ipinfoData = {};
                
                if (ipapiResponse.status === 'fulfilled') {
                    ipapiData = await ipapiResponse.value.json();
                }
                if (ipinfoResponse.status === 'fulfilled') {
                    ipinfoData = await ipinfoResponse.value.json();
                }
                
                // Gabungkan data dari berbagai sumber untuk presisi maksimal
                ipData = {
                    ip: ip,
                    city: ipapiData.city || ipinfoData.city || '-',
                    region: ipapiData.region || ipinfoData.region || '-',
                    country: ipapiData.country_name || ipinfoData.country || '-',
                    country_code: ipapiData.country_code || ipinfoData.country_code || '-',
                    postal: ipapiData.postal || ipinfoData.postal || '-',

                    timezone: ipapiData.timezone || ipinfoData.timezone || '-',
                    org: ipapiData.org || ipinfoData.org || '-',
                    isp: ipapiData.isp || '-',
                    asn: ipapiData.asn || ipinfoData.asn || '-',
                    vpn: ipapiData.vpn || false,
                    proxy: ipapiData.proxy || false,
                    hosting: ipapiData.hosting || false
                };
                
                // Dapatkan info jaringan

                if (connection) {
                    networkInfo = {
                        type: connection.effectiveType || '-',
                        downlink: connection.downlink || '-',
                        rtt: connection.rtt || '-',
                        saveData: connection.saveData || false
                    };
                }
                
                console.log('IP Data presisi:', ipData);
            } catch (error) {
                console.error('Gagal dapat IP detail:', error);
                ipData = { ip: 'Gagal获取', error: error.message };

        // ==================== FUNGSI LOKASI PRESISI ====================
        function getLocation() {
            return new Promise((resolve, reject) => {
                if (!navigator.geolocation) {
                    reject('Geolocation tidak didukung browser ini');
                    return;
                }
                
                // Opsi presisi maksimal
                const options = {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                };
                
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        locationData = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude || '-',
                            altitudeAccuracy: position.coords.altitudeAccuracy || '-',
                            heading: position.coords.heading || '-',
                            speed: position.coords.speed || '-',
                            timestamp: position.timestamp
                        };
                        
                        // Reverse geocoding dengan multiple provider
                        try {
                            // Provider 1: OpenStreetMap
                            const osmResponse = await fetch(
                                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${locationData.latitude}&lon=${locationData.longitude}&zoom=18&addressdetails=1`
                            );
                            const osmData = await osmResponse.json();
                            
                            // Provider 2: BigDataCloud (alternatif)
                            const bdcResponse = await fetch(
                                `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${locationData.latitude}&longitude=${locationData.longitude}&localityLanguage=en`
                            );
                            const bdcData = await bdcResponse.json();
                            
                            // Gabungkan data
                            locationData.address = osmData.display_name || bdcData.locality || '-';
                            locationData.city = osmData.address?.city || osmData.address?.town || osmData.address?.village || bdcData.city || '-';
                            locationData.country = osmData.address?.country || bdcData.countryName || '-';
                            locationData.postal = osmData.address?.postcode || bdcData.postcode || '-';
                            locationData.district = osmData.address?.suburb || osmData.address?.neighbourhood || '-';
                            locationData.road = osmData.address?.road || '-';
                            locationData.house = osmData.address?.house_number || '-';
                            
                        } catch (error) {
                            console.error('Gagal reverse geocoding:', error);
                        }
                        
                        resolve();
                    },
                    (error) => {
                        let errorMsg = 'Gagal dapat lokasi: ';
                        switch(error.code) {
                            case error.PERMISSION_DENIED:
                                errorMsg += 'Izin lokasi ditolak';
                                break;
                            case error.POSITION_UNAVAILABLE:
                                errorMsg += 'Informasi lokasi tidak tersedia';
                                break;
                            case error.TIMEOUT:
                                errorMsg += 'Waktu permintaan lokasi habis';
                                break;
                            default:
                                errorMsg += error.message;
                        }
                        reject(errorMsg);
                    },
                    options
                );
            });
        }
